<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#bdd7ff" />
    <title>RANGA Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(#bdd7ff 0%, #ffffff 42%);
        color: #002259;
        font-family: system-ui, sans-serif;
      }

      main {
        width: min(440px, calc(100vw - 32px));
        border: 1px solid rgba(189, 215, 255, 0.35);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RANGA is offline</h1>
      <p>The installed app shell is available, but agent analysis requires network access to Cerebras.</p>
    </main>
  </body>
</html>
